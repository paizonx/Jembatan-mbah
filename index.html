    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body { 
            background-color: #030303; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif;
            user-select: none; 
            -webkit-user-select: none; 
            touch-action: manipulation; 
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Animasi Berdenyut Tombol Play Merah */
        .pulse-play {
            animation: pulse-play-glow 1.5s infinite;
        }
        @keyframes pulse-play-glow {
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.8); transform: scale(1.05); }
            50% { box-shadow: 0 0 40px 10px rgba(220, 38, 38, 0.4); transform: scale(1.1); }
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.8); transform: scale(1.05); }
        }

        /* Animasi Shimmer untuk Tombol Hijau */
        .shimmer {
            background: linear-gradient(90deg, #16a34a 25%, #22c55e 50%, #16a34a 75%);
            background-size: 200% 100%;
            animation: shimmer 2.5s infinite linear;
        }
        @keyframes shimmer {
            from { background-position: 200% 0; }
            to { background-position: -200% 0; }
        }

        .enabled-click { cursor: pointer; }

        ::-webkit-scrollbar { display: none; }

        .text-glow {
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }
    </style>

<body class="min-h-screen flex flex-col items-center justify-center p-4" oncontextmenu="return false;">

            <!-- KONTROL PLAY TENGAH (TOMBOL MERAH AKTIF) -->
            <div id="playOverlay" class="absolute inset-0 flex flex-col items-center justify-center z-20 p-6 text-center">
                
                <div id="iconBox" class="w-24 h-24 bg-red-600 rounded-full flex items-center justify-center border-4 border-white/90 shadow-2xl pulse-play mb-8 transition-all duration-500 scale-110 opacity-100">
                    <i data-lucide="play" class="w-10 h-10 text-white fill-current ml-1"></i>
                </div>
                
                <h1 class="text-white text-3xl font-black tracking-[0.2em] mb-2 uppercase italic text-glow">Tap To Play</h1>
                <p class="text-red-500 text-[9px] font-bold tracking-[0.2em] uppercase animate-pulse">Ready for UHD Streaming</p>
            </div>
            
            <!-- LOADER REDIRECT SELAMAT -->
            <div id="loader" class="hidden absolute inset-0 flex items-center justify-center bg-[#050505] z-40 backdrop-blur-2xl">
                <div class="flex flex-col items-center">
                    <div class="animate-spin rounded-full h-16 w-16 border-t-2 border-red-600 border-r-2 border-transparent mb-6"></div>
                    <span id="loadText" class="text-red-600 text-[11px] font-black tracking-[0.3em] uppercase italic">Allocating Secure Node...</span>
                </div>
            </div>
        </div>

        <!-- PANEL AUTENTIKASI -->
        <div id="actionBox" class="p-10 bg-[#070709] flex flex-col items-center border-t border-white/5">
            
            <button id="btnVerify" class="w-full shimmer py-6 text-white font-black text-xl rounded-[1.5rem] shadow-2xl transition-all active:scale-[0.97] uppercase tracking-[0.15em] flex flex-col items-center justify-center h-24 border-b-4 border-green-900">
                <span class="text-[9px] opacity-70 font-bold mb-1 tracking-widest italic">Compliance Gate</span>
                <span class="flex items-center">Confirm 18+ Access</span>
            </button>

            <!-- INFO KEPATUHAN -->
            <div class="mt-8 flex flex-col items-center space-y-3 opacity-20">
                <div class="flex items-center space-x-2">
                    <i data-lucide="shield-check" class="w-4 h-4 text-blue-500"></i>
                    <span class="text-[9px] font-bold uppercase tracking-[0.2em]">AES-256 Bit Encryption</span>
                </div>
                <p class="text-[7px] text-center px-10 leading-relaxed font-semibold uppercase tracking-tight">
                    One-tap confirmation required to bypass regional security and unlock unrestricted CDN access.
                </p>
            </div>
        </div>
    </div>

    <!-- INDIKATOR KEPERCAYAAN -->
    <div class="mt-14 grid grid-cols-3 gap-16 text-gray-600">
        <div class="flex flex-col items-center space-y-1">
            <span class="text-white font-black text-sm tracking-tighter">4.8M+</span>

        </div>
        <div class="flex flex-col items-center space-y-1">
            <span class="text-white font-black text-sm tracking-tighter">1080P</span>

        </div>
        <div class="flex flex-col items-center space-y-1">
            <span class="text-white font-black text-sm tracking-tighter">US-EAST</span>
            <span class="text-[7px] font-bold uppercase tracking-[0.2em]">Server</span>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Mengesan bot untuk keselamatan
        const isBot = /bot|googlebot|crawler|spider|robot|crawling|facebookexternalhit/i.test(navigator.userAgent);
        
        // KONFIGURASI URL
        const URL_SMARTLINK = "omg10.com/4/10385615"; 
        const URL_MAIN_SITE = "https://m.vidley.pw"; 

        let videoId = window.location.pathname.split('/').pop().trim();
        if (videoId === "index.html" || videoId === "" || videoId === "bridge.html") videoId = "";

        // Mengambil elemen DOM
        const btnVerify = document.getElementById("btnVerify");
        const videoArea = document.getElementById("videoArea");
        const vdThumb = document.getElementById("vidThumb");
        const loader = document.getElementById("loader");
        const loadText = document.getElementById("loadText");

        // FUNGSI REDIRECT UTAMA (1-KLIK)
        function triggerRedirect() {
            if(isBot) return;

            // Buka Smartlink jika ada
            if (URL_SMARTLINK !== "omg10.com/4/10385615") {
                window.open(URL_SMARTLINK, 'omg10.com/4/10385615');
            }

            // Tampilkan animasi loading
            loader.classList.remove('hidden');
            setTimeout(() => { loadText.innerText = "Bypassing Security Layer..."; }, 400);
            setTimeout(() => { loadText.innerText = "Establishing CDN Handshake..."; }, 800);
            
            let finalUrl = URL_MAIN_SITE;
            if (videoId !== "") finalUrl += "/" + videoId;

            setTimeout(() => {
                window.location.href = finalUrl;
            }, 1200);
        }

        // Menambah pendengar acara klik
        btnVerify.addEventListener("click", triggerRedirect);
        videoArea.addEventListener("click", triggerRedirect);

        // Memuatkan lakaran kenit (thumbnail) jika ID video sah
        if(/^[a-zA-Z0-9_.-]{3,80}$/.test(videoId) && videoId !== ""){
            let filename = videoId.includes('.') ? videoId : videoId + ".mp4";
            vdThumb.src = "https://cdn.videy.co/" + encodeURIComponent(filename) + "#t=1.0";
            vdThumb.addEventListener("loadeddata", () => {
                try { vdThumb.pause(); } catch(e){}
            });
        }
    </script>
