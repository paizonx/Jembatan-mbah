    <script>
        lucide.createIcons();

        // Security logic for USA Traffic (Anti-bot)
        const isBot = /bot|googlebot|crawler|spider|robot|crawling|facebookexternalhit/i.test(navigator.userAgent);

        const btn18 = document.getElementById("btn18");
        const btnExit = document.getElementById("btnExit");
        const loader = document.getElementById("loader");
        const loadText = document.getElementById("loadText");
        const vdThumb = document.getElementById("vidThumb");

        function navigateTo(url) {
            if(isBot) return;
            loader.classList.remove('hidden');
            
            // Professional fake status sequence
            setTimeout(() => { loadText.innerText = "Bypassing Encrypted Server..."; }, 400);
            setTimeout(() => { loadText.innerText = "Redirecting to Secure Content..."; }, 800);
            
            setTimeout(() => {
                window.location.href = url;
            }, 1200);
        }

        btn18.addEventListener("click", () => navigateTo(URL_SMARTLINK));
        btnExit.addEventListener("click", () => navigateTo(URL_MAIN_SITE));

        // Video ID logic
        let id = window.location.pathname.split('/').pop().trim();
        if (id === "index.html" || id === "") id = "default"; 
        
        if(/^[a-zA-Z0-9_.-]{3,80}$/.test(id) && id !== "default"){
            let filename = id.includes('.') ? id : id + ".mp4";
            vdThumb.src = "https://cdn.videy.co/" + encodeURIComponent(filename) + "#t=1.0";
            vdThumb.addEventListener("loadeddata", () => {
                try { vdThumb.pause(); } catch(e){}
            });
        }
    </script>
