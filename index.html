<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Video Access</title>

<meta name="referrer" content="no-referrer">
<meta name="robots" content="noindex, nofollow">

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#0f0f0f;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.container {
    max-width:400px;
    padding:20px;
}

.thumb {
    width:100%;
    border-radius:12px;
    margin-bottom:15px;
}

.btn {
    display:block;
    background:#ff2e63;
    padding:15px;
    border-radius:10px;
    text-decoration:none;
    color:#fff;
    font-weight:bold;
    margin-top:15px;
    opacity:0.6;
    pointer-events:none;
}

.small {
    font-size:12px;
    color:#aaa;
    margin-top:10px;
}
</style>

<script>
// Ambil parameter ID video
function getVideoId(){
    const params = new URLSearchParams(window.location.search);
    return params.get("v") || "default";
}

// Delay biar natural
function enableButton(){
    document.getElementById("btn").style.opacity = "1";
    document.getElementById("btn").style.pointerEvents = "auto";
}

// Redirect ke main page bawa ID
function goLink(){
    let vid = getVideoId();

    // encode link tujuan
    let base = atob("aHR0cHM6Ly95b3VybWFpbnBhZ2UuY29tL21haW4uaHRtbA==");

    window.location.href = base + "?v=" + vid;
}

// Anti bot sederhana
if(navigator.webdriver){
    window.location.href = "about:blank";
}

window.onload = function(){
    setTimeout(enableButton, 2000);

    // Optional: dynamic thumbnail (kalau ada CDN)
    let vid = getVideoId();
    let thumb = document.getElementById("thumb");

    // contoh struktur thumbnail (silakan sesuaikan)
    thumb.src = "https://yourcdn.com/thumb/" + vid + ".jpg";
}
</script>

</head>

<body>

<div class="container">

<img id="thumb" class="thumb" src="https://via.placeholder.com/400x250">

<h2>Private Video Access</h2>
<p>This content is restricted. Tap below to continue.</p>

<a id="btn" href="javascript:void(0)" onclick="goLink()" class="btn">
Tap to Continue
</a>

<div class="small">
Members only • Secure access
</div>

</div>

</body>
</html>
