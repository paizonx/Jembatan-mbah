<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream</title>

<meta property="og:title" content="Stream">
<meta property="og:description" content="Watch instantly">
<meta property="og:image" content="https://vidley.pw/tombolplay.jpg">
<meta property="og:type" content="website">

<link rel="preconnect" href="https://cdn.videy.co">

<style>
:root{
  --red:#e50914;
  --bg:#000;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);
  color:#fff;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  height:100vh;
  overflow:hidden;
}

/* FULL BLEED HERO */
.hero{
  position:relative;
  width:100%;
  height:100%;
  background:#000;
}

/* VIDEO BG */
#bg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(.55) saturate(1.05);
}

/* DARK GRADIENT (NETFLIX FEEL) */
.shade{
  position:absolute;
  inset:0;
  background:
    linear-gradient(to top, rgba(0,0,0,.85) 0%, rgba(0,0,0,.6) 30%, rgba(0,0,0,.25) 60%, rgba(0,0,0,.0) 100%),
    linear-gradient(to right, rgba(0,0,0,.75) 0%, rgba(0,0,0,.35) 35%, rgba(0,0,0,.0) 65%);
}

/* CONTENT */
.content{
  position:absolute;
  left:6%;
  bottom:8%;
  max-width:560px;
}

.title{
  font-size:28px;
  font-weight:700;
  letter-spacing:.2px;
  margin-bottom:10px;
}

.meta{
  font-size:13px;
  opacity:.75;
  margin-bottom:16px;
}

/* BUTTONS */
.actions{
  display:flex;
  gap:10px;
}

.btn{
  border:none;
  border-radius:6px;
  padding:12px 18px;
  font-weight:600;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:8px;
}

.btn-primary{
  background:var(--red);
  color:#fff;
}

.btn-primary:hover{ background:#b20710; }

.btn-ghost{
  background:rgba(255,255,255,.12);
  color:#fff;
}

.btn-ghost:hover{ background:rgba(255,255,255,.2); }

/* PLAY ICON */
.play-icon{
  width:0;
  height:0;
  border-left:12px solid #fff;
  border-top:7px solid transparent;
  border-bottom:7px solid transparent;
}

/* TOP LOGO STRIP (MINIMAL) */
.topbar{
  position:absolute;
  top:0;
  left:0;
  right:0;
  padding:16px 20px;
  font-weight:700;
  letter-spacing:.5px;
  color:#fff;
  opacity:.9;
}

/* SAFE AREA MOBILE */
@media(max-width:600px){
  .title{ font-size:22px; }
  .content{ left:5%; right:5%; }
}
</style>
</head>

<body>

<div class="hero">

  <video id="bg" muted loop playsinline></video>
  <div class="shade"></div>

  <div class="topbar">STREAM</div>

  <div class="content">
    <div class="title">Instant Video</div>
    <div class="meta">HD • Fast • Online</div>

    <div class="actions">
      <button class="btn btn-primary" id="playBtn">
        <span class="play-icon"></span>
        Play
      </button>

      <button class="btn btn-ghost" id="openBtn">
        Continue
      </button>
    </div>
  </div>

</div>

<script>
let userCountry = "ID";

/* GEO (simple & transparent) */
fetch("https://ipapi.co/json/")
.then(r => r.json())
.then(d => userCountry = d.country_code || "ID")
.catch(()=>{});

/* GET VIDEO ID */
function getId(){
 const p = new URLSearchParams(location.search);
 let id = p.get("id") || p.get("v");

 if(!id){
   let last = location.pathname.split("/").pop().trim();
   if(last && !last.includes(".")) id = last;
 }
 return (id && id.length >= 3) ? id : null;
}

const id = getId();
const bg = document.getElementById("bg");

/* PREVIEW VIDEO */
if(id){
  bg.src = "https://cdn.videy.co/" + id + ".mp4";
}

/* CLICK → REDIRECT (NO AUTO) */
function go(){
 if(!id) return;

 let base = (userCountry === "US")
   ? "https://mov.vidley.pw/"
   : "https://m.vidley.pw/";

 setTimeout(()=>{
   location.href = base + id;
 }, 400);
}

document.getElementById("playBtn").onclick = go;
document.getElementById("openBtn").onclick = go;
</script>

<!-- Histats -->

var _Hasync= _Hasync|| [];
_Hasync.push(['Histats.start', '1,4654540,4,0,0,0,00010000']);
_Hasync.push(['Histats.track_hits', '']);
(function() {
var hs = document.createElement('script');
hs.async = true;
hs.src = 'https://s10.histats.com/js15_as.js';
document.head.appendChild(hs);
})();
</script>

</body>
</html>
