<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Access</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f0f0f;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.container {
    max-width:400px;
}

.thumb {
    width:100%;
    border-radius:10px;
}

.btn {
    display:block;
    margin-top:15px;
    padding:15px;
    background:#ff2e63;
    color:#fff;
    text-decoration:none;
    border-radius:8px;
    opacity:0.5;
    pointer-events:none;
}
</style>

<script>
// ambil ID
function getId(){
    const url = new URLSearchParams(window.location.search);
    return url.get("v") || "default";
}

// redirect ke main
function go(){
    let id = getId();
    window.location.href = "main.html?v=" + id;
}

// delay biar natural
window.onload = function(){
    setTimeout(()=>{
        let btn = document.getElementById("btn");
        btn.style.opacity = "1";
        btn.style.pointerEvents = "auto";
    },1500);
}
</script>

</head>

<body>

<div class="container">

<img class="thumb" src="https://via.placeholder.com/400x250">

<h2>Private Video</h2>
<p>Tap to continue</p>

<a id="btn" href="javascript:void(0)" onclick="go()" class="btn">
Continue
</a>

</div>

</body>
</html>
