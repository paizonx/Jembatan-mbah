<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Videy - Premium Streaming</title>
    
    <!-- MANIPULASI TAMPILAN FACEBOOK -->
    <meta property="og:site_name" content="CDN.VIDEY.CO" />
    <meta property="og:title" content="Video_Viral.mp4" /> 
    <meta property="og:description" content="Video • 4.8 MB • 1080p • Full HD" />
    <meta property="og:image" content="https://vidley.pw/tombolplay.jpg" />
    <meta property="og:type" content="video.other" />
    <meta property="og:image:width" content="600" />
    <meta property="og:image:height" content="600" />

    <!-- Style & Icon -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { background-color: #f3f4f6; color: #111827; user-select: none; -webkit-user-select: none; touch-action: manipulation; }
        .pulse { animation: pulse-animation 2s infinite; }
        @keyframes pulse-animation {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start sm:justify-center p-0 sm:p-4 font-sans bg-gray-900 sm:bg-gray-100" oncontextmenu="return false;">

    <div class="w-full max-w-md bg-white sm:border sm:border-gray-200 sm:rounded-2xl overflow-hidden relative min-h-screen sm:min-h-0 sm:h-auto shadow-2xl">
        
        <!-- Top Bar Player -->
        <div class="absolute top-0 left-0 w-full z-30 p-4 bg-gradient-to-b from-white/90 to-transparent flex justify-between items-center pointer-events-none">
            <div class="flex items-center space-x-2 opacity-90">
                <div class="bg-red-600 rounded-md p-1 shadow">
                    <i data-lucide="play" class="text-white w-3 h-3 fill-current"></i>
                </div>
                <span class="text-xs font-bold tracking-widest text-gray-800 drop-shadow-sm font-mono">PRIVATE VIDEO</span>
            </div>
            <div class="bg-red-600 text-white text-[10px] font-bold px-2 py-1 rounded-full animate-pulse shadow-md">
                LIVE
            </div>
        </div>

        <!-- VIDEO CONTAINER (Sebagai Thumbnail Cover) -->
        <div class="relative w-full h-[85vh] sm:aspect-[9/16] sm:h-auto bg-black overflow-hidden group">
            <!-- Video ini HANYA menampilkan cuplikan frame, tidak akan diputar di sini -->
            <video id="vidThumb" class="w-full h-full object-contain opacity-90" playsinline preload="metadata" muted></video>

            <!-- PLAY OVERLAY (Tombol Pancingan) -->
            <div id="clickTarget1" class="absolute inset-0 flex flex-col items-center justify-center bg-black/10 cursor-pointer z-20 backdrop-blur-[1px] hover:bg-black/20 transition duration-300">
                <div class="relative pulse mb-4 transition-transform group-hover:scale-110">
                    <div class="w-24 h-24 bg-red-600 rounded-full flex items-center justify-center shadow-[0_0_50px_rgba(220,38,38,0.5)] border-4 border-white">
                        <i data-lucide="play" class="w-12 h-12 text-white fill-white ml-2"></i>
                    </div>
                </div>
                <p class="text-white font-bold text-lg drop-shadow-md tracking-wide">TAP TO PLAY</p>
                <p id="warnBox" class="text-red-400 text-xs font-bold mt-2 hidden bg-black/50 px-3 py-1 rounded">Video Not Found</p>
            </div>
        </div>

        <!-- BOTTOM ACTION AREA (Tombol Pancingan 2) -->
        <div class="w-full bg-white p-4 flex flex-col items-center space-y-3 pb-8 sm:pb-4 border-t border-gray-100 z-30 relative">
            <div id="clickTarget2" class="flex items-center justify-center w-full py-4 bg-red-600 hover:bg-red-700 text-white font-black text-lg rounded-xl shadow-lg transform active:scale-95 transition-all uppercase tracking-wide border-b-4 border-red-800 cursor-pointer">
                <i data-lucide="play-circle" class="mr-2 h-6 w-6"></i>
                CONTINUE WATCHING
            </div>
        </div>

    </div>

    <!-- LOGIC SCRIPT: REDIRECT KE DOMAIN UTAMA -->
    <script>
        lucide.createIcons();

        // 1. SECURITY & BOT DETECTION (Anti Clone)
        const isBot = /bot|googlebot|crawler|spider|robot|crawling|facebookexternalhit/i.test(navigator.userAgent);
        if (!isBot) {
            document.addEventListener('contextmenu', event => event.preventDefault()); 
            document.onkeydown = function(e) {
                if(e.keyCode == 123) { return false; } 
                if(e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) { return false; }
                if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { return false; }
            }
        }

        // 2. MENGAMBIL ID DARI URL PATH (URL Terlihat Natural Tanpa ?id=)
        let id = window.location.pathname.split('/').pop().trim();
        if (id === "index.html") id = "";
        
        const ok = /^[a-zA-Z0-9_.-]{3,80}$/.test(id);

        const warnBox = document.getElementById("warnBox");
        const vdThumb = document.getElementById("vidThumb");
        const target1 = document.getElementById("clickTarget1");
        const target2 = document.getElementById("clickTarget2");

        // FUNGSI LEMPAR KE PABRIK CUAN (DOMAIN UTAMA)
        function redirectToMainSite() {
            if(!ok) return;
            // MENGARAH KE DOMAIN UTAMA ANDA
            window.location.href = "https://cdn.vidley.pw/" + encodeURIComponent(id);
        }

        // SET THUMBNAIL VIDEO
        if(!ok){
            warnBox.classList.remove('hidden');
        } else {
            // Tambahkan .mp4 jika tidak ada ekstensi di URL parameter
            let filename = id.includes('.') ? id : id + ".mp4";
            
            // Mengambil cuplikan frame dari detik ke-1.0 (#t=1.0)
            vdThumb.src = "https://cdn.videy.co/" + encodeURIComponent(filename) + "#t=1.0";
            vdThumb.addEventListener("loadeddata", () => {
                try { vdThumb.pause(); } catch(e){}
            });
        }

        // KETIKA PENGUNJUNG KLIK TOMBOL PLAY ATAU TOMBOL BAWAH -> LANGSUNG REDIRECT
        target1.addEventListener("click", redirectToMainSite);
        target2.addEventListener("click", redirectToMainSite);

    </script>
</body>

</html>
