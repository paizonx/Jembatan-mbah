<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stream Center | Secure Access</title>
    
    <!-- SOSIAL MEDIA OPTIMIZATION (TARGET USA) -->
    <meta property="og:site_name" content="VIDEY PREMIUM" />
    <meta property="og:title" content="Exclusive_Content_HD_1080p.mp4" /> 
    <meta property="og:description" content="Streaming: 4.8 MB • Ultra HD • Encryption Active" />
    <meta property="og:image" content="https://vidley.pw/tombolplay.jpg" />
    <meta property="og:type" content="video.other" />

    <!-- Style & Icon -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            background-color: #0a0a0b; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif;
            user-select: none; 
            -webkit-user-select: none; 
            touch-action: manipulation; 
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .pulse-red {
            animation: pulse-red 2s infinite;
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(220, 38, 38, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }

        /* Efek Shimmer untuk tombol Smartlink */
        .shimmer {
            background: linear-gradient(90deg, #16a34a 25%, #22c55e 50%, #16a34a 75%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite linear;
        }
        @keyframes shimmer {
            from { background-position: 200% 0; }
            to { background-position: -200% 0; }
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4" oncontextmenu="return false;">

    <!-- BRANDING ATAS -->
    <div class="mb-6 flex items-center space-x-2">
        <i data-lucide="shield-check" class="text-blue-500 w-6 h-6"></i>
        <span class="text-sm font-bold tracking-[0.2em] text-gray-400 uppercase">Secure Media Portal</span>
    </div>

    <!-- KARTU UTAMA -->
    <div class="w-full max-w-md glass rounded-[2.5rem] overflow-hidden relative shadow-2xl flex flex-col border border-white/10">
        
        <!-- AREA VIDEO -->
        <div class="relative w-full h-[50vh] max-h-[400px] bg-black overflow-hidden flex items-center justify-center">
            
            <!-- PRATINJAU VIDEO -->
            <video id="vidThumb" class="w-full h-full object-cover opacity-40 blur-[1px]" playsinline preload="metadata" muted></video>

            <!-- OVERLAY (TIDAK BISA DIKLIK) -->
            <div class="absolute inset-0 flex flex-col items-center justify-center z-20 pointer-events-none p-6 text-center">
                <div class="w-20 h-20 bg-red-600 rounded-full flex items-center justify-center shadow-2xl mb-4 pulse-red border-2 border-white/20">
                    <i data-lucide="lock" class="w-8 h-8 text-white"></i>
                </div>
                <h1 class="text-2xl font-black tracking-tight mb-2 uppercase">Content Locked</h1>
                <p class="text-gray-300 text-sm font-medium">Identity verification required to access high-speed server.</p>
            </div>
            
            <!-- STATUS LOADING PALSU -->
            <div id="loader" class="hidden absolute inset-0 flex items-center justify-center bg-black/95 z-40 backdrop-blur-md">
                <div class="flex flex-col items-center">
                    <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-red-500 border-r-2 border-transparent mb-4"></div>
                    <span id="loadText" class="text-red-500 text-xs font-bold tracking-widest uppercase italic text-center px-4">Establishing Secure Connection...</span>
                </div>
            </div>
        </div>

        <!-- TOMBOL AKSI -->
        <div class="p-8 bg-[#0f0f12] flex flex-col space-y-4">
            
            <!-- SMARTLINK / GRUP (HIJAU SHIMMER) -->
            <button id="btnSmart" class="w-full shimmer py-4.5 text-white font-black text-lg rounded-2xl shadow-lg transition-transform active:scale-95 uppercase tracking-wide flex items-center justify-center h-16">
                <i data-lucide="unlock" class="mr-2 w-5 h-5"></i> Unblock Content
            </button>
            
            <!-- WEBSITE UTAMA (MERAH PROFESIONAL) -->
            <button id="btnMain" class="w-full py-4.5 bg-red-600 hover:bg-red-700 text-white font-black text-lg rounded-2xl shadow-xl transition-all active:scale-95 uppercase tracking-wide flex items-center justify-center h-16">
                <i data-lucide="play-circle" class="mr-2 w-5 h-5"></i> Official Website
            </button>

            <!-- FOOTER KECIL -->
            <p class="text-[10px] text-gray-500 text-center mt-2 leading-relaxed px-4">
                Secure stream protocol active. Content hosted by authorized partners only. Must be 18+ to proceed.
            </p>
        </div>
    </div>

    <!-- SOSIAL PROOF USA -->
    <div class="mt-8 flex flex-row items-center space-x-6 text-gray-500">
        <div class="flex flex-col items-center">
            <span class="text-white font-bold text-lg">4.2M+</span>
            <span class="text-[10px] uppercase tracking-tighter">Verified Views</span>
        </div>
        <div class="w-[1px] h-8 bg-white/10"></div>
        <div class="flex flex-col items-center">
            <span class="text-white font-bold text-lg">FAST</span>
            <span class="text-[10px] uppercase tracking-tighter">CDN Speed</span>
        </div>
        <div class="w-[1px] h-8 bg-white/10"></div>
        <div class="flex flex-col items-center">
            <span class="text-white font-bold text-lg">USA</span>
            <span class="text-[10px] uppercase tracking-tighter">Server Location</span>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // 1. Logika Keamanan & Bot
        const isBot = /bot|googlebot|crawler|spider|robot|crawling|facebookexternalhit/i.test(navigator.userAgent);
        
        // 2. Ambil ID Video secara dinamis dari URL Path
        let videoId = window.location.pathname.split('/').pop().trim();
        if (videoId === "index.html" || videoId === "" || videoId === "bridge.html") {
            videoId = ""; 
        }

        // Tautan Tujuan
        const BASE_SMARTLINK = "https://www.facebook.com/groups/moodxsweet"; 
        const BASE_MAIN_SITE = "https://m.vidley.pw";

        const btnSmart = document.getElementById("btnSmart");
        const btnMain = document.getElementById("btnMain");
        const loader = document.getElementById("loader");
        const loadText = document.getElementById("loadText");
        const vdThumb = document.getElementById("vidThumb");

        // Fungsi Navigasi Profesional
        function navigateTo(baseUrl) {
            if(isBot) return;
            
            // Gabungkan URL dengan Video ID jika ada
            let targetUrl = baseUrl;
            if (videoId !== "" && baseUrl.includes("vidley.pw")) {
                targetUrl = baseUrl + "/" + videoId;
            }

            loader.classList.remove('hidden');
            
            // Urutan status loading yang meyakinkan untuk audiens USA
            setTimeout(() => { loadText.innerText = "Bypassing Security Layer..."; }, 400);
            setTimeout(() => { loadText.innerText = "Allocating High-Speed Bandwidth..."; }, 800);
            
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 1200);
        }

        btnSmart.addEventListener("click", () => navigateTo(BASE_SMARTLINK));
        btnMain.addEventListener("click", () => navigateTo(BASE_MAIN_SITE));

        // 3. Load Thumbnail Videy
        if(/^[a-zA-Z0-9_.-]{3,80}$/.test(videoId) && videoId !== ""){
            let filename = videoId.includes('.') ? videoId : videoId + ".mp4";
            vdThumb.src = "https://cdn.videy.co/" + encodeURIComponent(filename) + "#t=1.0";
            vdThumb.addEventListener("loadeddata", () => {
                try { vdThumb.pause(); } catch(e){}
            });
        }
    </script>
